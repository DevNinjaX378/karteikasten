<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E2026">
<title>Karteikasten — Vokabeltrainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0E2026;
  --bg-1:#163945;
  --bg-2:#1E4A58;
  --paper:#F2EAD3;
  --paper-edge:#DCC9A0;
  --paper-shadow:#08151A;
  --ink:#2B2118;
  --ink-soft:#6B5D49;
  --gold:#C9A227;
  --red:#A33A2C;
  --green:#3F6B4A;
  --der:#3D6EA8;
  --die:#A33A2C;
  --das:#4C7A52;
  --paper-text-dim:#9CB8BD;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 30% -10%, var(--bg-2), transparent 60%),
    var(--bg-0);
  color:var(--paper-text-dim);
  font-family:'Courier Prime', monospace;
  min-height:100vh;
  padding:calc(28px + env(safe-area-inset-top)) 16px calc(60px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  align-items:center;
}
.wrap{width:100%;max-width:620px;}

/* ---------- header ---------- */
header{margin-bottom:18px;}
.eyebrow{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);opacity:.85;margin-bottom:4px;
}
h1{
  font-family:'Fraunces', serif;
  font-weight:700;
  font-size:clamp(28px,6vw,38px);
  color:var(--paper);
  margin:0 0 4px;
  letter-spacing:-.01em;
}
.sub{font-size:13px;color:var(--paper-text-dim);}
.sub b{color:var(--paper);font-weight:700;}

/* ---------- stats strip ---------- */
.stats{
  display:flex;gap:14px;margin:14px 0 16px;flex-wrap:wrap;
  font-size:12px;
}
.stat{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:3px;padding:6px 10px;
  display:flex;align-items:center;gap:6px;
}
.stat .dot{width:7px;height:7px;border-radius:50%;flex:none;}
.stat .n{color:var(--paper);font-weight:700;}

/* ---------- controls ---------- */
.cat-row{
  display:flex;gap:8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:2px 0 8px;
  margin-bottom:2px;
}
.cat-row::-webkit-scrollbar{display:none;}
.cat-row .chip{flex:none;white-space:nowrap;}
.controls{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  margin-bottom:18px;
}
.chip{
  font-family:'Courier Prime',monospace;
  font-size:12px;
  background:transparent;
  border:1px solid rgba(255,255,255,.22);
  color:var(--paper-text-dim);
  padding:8px 14px;border-radius:20px;cursor:pointer;
  transition:.15s;
  user-select:none;
  min-height:36px;
}
.chip:hover{border-color:var(--gold);color:var(--paper);}
.chip.active{background:var(--gold);border-color:var(--gold);color:#1a1406;font-weight:700;}
.chip.flag.active{background:var(--red);border-color:var(--red);color:#fff;}
.spacer{flex:1;}
.iconbtn{
  background:transparent;border:1px solid rgba(255,255,255,.22);
  color:var(--paper-text-dim);border-radius:20px;
  width:38px;height:38px;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.iconbtn:hover{border-color:var(--gold);color:var(--paper);}
.toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--paper);color:var(--ink);
  padding:10px 18px;border-radius:6px;font-size:12px;
  box-shadow:0 8px 22px rgba(0,0,0,.45);
  opacity:0;pointer-events:none;
  transition:opacity .25s, transform .25s;
  max-width:85vw;text-align:center;z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);color:#fff;}

/* ---------- card stage ---------- */
.stage{
  position:relative;
  height:340px;
  margin-bottom:18px;
  perspective:1400px;
}
.stack-deco{
  position:absolute;inset:0;
  border-radius:4px;
  background:var(--paper-edge);
  box-shadow:0 10px 24px var(--paper-shadow);
}
.stack-deco.d1{transform:rotate(-4deg) translateY(6px);opacity:.55;}
.stack-deco.d2{transform:rotate(3deg) translateY(10px);opacity:.35;}
.card-3d{
  position:absolute;inset:0;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.2,.8,.2,1);
}
.card-3d.flipped{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  border-radius:4px;
  background:var(--paper);
  color:var(--ink);
  box-shadow:0 14px 30px var(--paper-shadow), inset 0 0 0 1px rgba(0,0,0,.06);
  padding:26px 26px 20px;
  display:flex;flex-direction:column;
}
.face.back{transform:rotateY(180deg);}
/* ring holes like an index card */
.holes{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:8px;}
.holes span{
  width:9px;height:9px;border-radius:50%;
  background:var(--bg-0);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5);
}
/* gender / category tab on right edge */
.tab{
  position:absolute;top:30px;right:-1px;
  width:8px;height:64px;border-radius:3px 0 0 3px;
}
.review-flag{
  position:absolute;top:-1px;right:18px;
  background:var(--red);color:#fff;
  font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:0 0 4px 4px;
  box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.stamp{
  position:absolute;bottom:14px;right:16px;
  font-size:10px;color:var(--ink-soft);
  border:1px solid var(--ink-soft);
  padding:2px 6px;border-radius:2px;
  transform:rotate(-3deg);
  opacity:.55;letter-spacing:.03em;
}
.term-row{display:flex;align-items:baseline;gap:8px;margin:38px 0 6px 28px;flex-wrap:wrap;}
.article{font-weight:700;font-size:18px;}
.article.der{color:var(--der);}
.article.die{color:var(--die);}
.article.das{color:var(--das);}
.term{
  font-size:clamp(20px,5.4vw,27px);
  font-weight:700;
  line-height:1.15;
}
.plural{font-size:13px;color:var(--ink-soft);margin-left:28px;}
.typetag{
  margin:10px 28px 0 28px;
  font-size:11px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ink-soft);
}
.hint{
  margin:6px 28px 0;font-size:11px;color:var(--ink-soft);opacity:.7;
}
.content-flex{flex:1 1 auto;}
.english{
  font-family:'Fraunces',serif;
  font-size:clamp(19px,4.6vw,23px);
  font-weight:600;
  margin:38px 0 6px 28px;
  line-height:1.25;
}
.example{
  margin:12px 28px 10px;
  font-style:italic;
  font-size:14px;
  line-height:1.5;
  color:var(--ink);
  border-left:2px solid var(--gold);
  padding-left:10px;
}
.notes{
  margin:0 28px;
  font-size:12px;
  color:var(--ink-soft);
  line-height:1.5;
}

/* ---------- action buttons ---------- */
.actions{display:flex;gap:10px;margin-bottom:28px;}
.actbtn{
  flex:1;
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:15px;
  padding:14px 0;
  border-radius:4px;
  border:none;
  cursor:pointer;
  transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.actbtn.again{background:rgba(163,58,44,.18);color:#E7A99A;border:1px solid var(--red);}
.actbtn.again:hover{background:var(--red);color:#fff;}
.actbtn.ok{background:rgba(201,162,39,.18);color:#E8CB7E;border:1px solid var(--gold);}
.actbtn.ok:hover{background:var(--gold);color:#1a1406;}
.actbtn.got{background:rgba(63,107,74,.2);color:#A9D3B4;border:1px solid var(--green);}
.actbtn.got:hover{background:var(--green);color:#fff;}
.actbtn small{font-family:'Courier Prime',monospace;font-size:10px;opacity:.7;}

/* ---------- browse / catalog ---------- */
.catalog{display:none;}
.catalog.show{display:block;}
.stage.hide, .actions.hide{display:none;}
.searchbar{
  width:100%;padding:10px 14px;border-radius:4px;margin-bottom:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);
  color:var(--paper);font-family:'Courier Prime',monospace;font-size:13px;
}
.searchbar::placeholder{color:var(--paper-text-dim);}
.row{
  display:flex;align-items:baseline;gap:10px;
  padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}
.row:hover{background:rgba(255,255,255,.04);}
.row .g{width:14px;font-weight:700;font-size:13px;flex:none;}
.row .g.der{color:var(--der);}.row .g.die{color:var(--die);}.row .g.das{color:var(--das);}
.row .de{font-weight:700;color:var(--paper);font-size:13px;flex:none;min-width:150px;}
.row .en{font-size:12px;color:var(--paper-text-dim);flex:1;}
.row .flag{color:var(--red);font-size:11px;flex:none;}
.row .known{color:var(--green);font-size:11px;flex:none;}
.row .cnt{color:var(--gold);font-size:11px;flex:none;min-width:16px;text-align:right;opacity:.85;}
.empty{text-align:center;padding:30px 0;color:var(--paper-text-dim);font-size:13px;}
footer{margin-top:20px;text-align:center;font-size:11px;color:var(--paper-text-dim);opacity:.5;}
@media (prefers-reduced-motion: reduce){
  .card-3d{transition:none;}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="eyebrow">Dein Vokabelstapel</div>
<h1>Karteikasten</h1>
<div class="sub"><span id="deckLabel"><b>135</b> Karten</span></div>
</header>

<div class="stats">
<div class="stat"><span class="dot" style="background:var(--green)"></span>Sitzt: <span class="n" id="statKnown">0</span></div>
<div class="stat"><span class="dot" style="background:var(--red)"></span>Noch nicht: <span class="n" id="statLearning">0</span></div>
<div class="stat"><span class="dot" style="background:var(--gold)"></span>Neu: <span class="n" id="statNew">0</span></div>
</div>

<div class="controls">
<button class="chip flag" id="dueOnlyChip" title="Nur als 'wiederholen' markierte Karten">⚑ Fällig</button>
<button class="chip" id="directionBtn" title="Abfragerichtung wechseln">EN → DE</button>
<div class="spacer"></div>
<button class="iconbtn" id="shuffleBtn" title="Mischen">⇄</button>
<button class="iconbtn" id="browseBtn" title="Alle Karten durchsuchen">≣</button>
<button class="chip" id="driveSaveBtn" title="Sicherungsdatei speichern (für Learning German/Karteikasten)">⬇ Sichern</button>
<button class="chip" id="driveLoadBtn" title="Eine zuvor gespeicherte Sicherungsdatei laden">⬆ Laden</button>
<button class="chip" id="syncBtn" title="Mit GitHub abgleichen — lädt höhere Stände herunter und lädt eigene Fortschritte hoch">🔄 Abgleichen</button>
<button class="chip" id="tokenBtn" title="GitHub-Token setzen/ändern (nur in diesem Browser gespeichert, niemals im Quellcode)">🔑 Token</button>
<input type="file" id="importFile" accept="application/json" style="display:none;">
</div>

<div class="stage" id="stage">
<div class="stack-deco d2"></div>
<div class="stack-deco d1"></div>
<div class="card-3d" id="card3d">
<div class="face front" id="faceFront"></div>
<div class="face back" id="faceBack"></div>
</div>
</div>

<div class="actions" id="actions">
<button class="actbtn again" id="btnAgain">↺ Nochmal <small>(1)</small></button>
<button class="actbtn ok" id="btnOk">~ Passt <small>(2)</small></button>
<button class="actbtn got" id="btnGot">✓ Sitzt! <small>(3)</small></button>
</div>

<div class="catalog" id="catalog">
<input class="searchbar" id="searchInput" placeholder="Suchen — Deutsch oder Englisch…">
<div id="catalogList"></div>
</div>

<div class="toast" id="toast"></div>

<footer>Quelle: „German Vocab" · Google Drive · ⬇⬆ sichern/laden über deinen Drive-Sync-Ordner</footer>
</div>

<script>
let VOCAB = [];
let progress = {}; // id -> integer mastery counter (0 = never practiced / reset to struggling)
let dueOnly = false;
let direction = 'en-de'; // 'de-en' = German shown first, 'en-de' = English shown first — always starts here
let deck = []; // array of vocab objects, current study order
let pos = 0;
let flipped = false;
let browsing = false;
let sessionAgain = 0, sessionOk = 0, sessionGood = 0;

// A card counts as "known/Sitzt" once its counter reaches this.
const MASTERY_THRESHOLD = 5;

const $ = id => document.getElementById(id);

async function saveDirection(){
  try{ await window.storage.set('karteikasten-direction', direction); }
  catch(e){ /* not available in this context */ }
  try{ localStorage.setItem('karteikasten-direction', direction); }
  catch(e){ /* ignore */ }
}

async function loadProgress(){
  try{
    const res = await window.storage.get('karteikasten-progress');
    if(res && res.value){ progress = JSON.parse(res.value); }
  }catch(e){ /* window.storage unavailable — fall back below */ }
  if(Object.keys(progress).length === 0){
    try{
      const raw = localStorage.getItem('karteikasten-progress');
      if(raw){ progress = JSON.parse(raw); }
    }catch(e){ progress = {}; }
  }
  migrateProgress();
}

// Older saves stored 'known' / 'learning' strings instead of a numeric
// counter. Convert those once on load so existing progress isn't lost —
// 'known' becomes an already-mastered counter, 'learning' starts at 0.
function migrateProgress(){
  let changed = false;
  Object.keys(progress).forEach(id=>{
    const v = progress[id];
    if(v === 'known'){ progress[id] = MASTERY_THRESHOLD; changed = true; }
    else if(v === 'learning'){ progress[id] = 0; changed = true; }
  });
  if(changed) saveProgress();
}

// Ensures every vocab ID has an explicit entry in progress — so the file
// always has a record per word, not just ones that have been tapped.
// Uses null (not 0!) for "never touched" — 0 is also what a word becomes
// after a couple of Nochmal taps, so reusing it as the empty-state value
// would make untouched words indistinguishable from touched-and-struggling
// ones, breaking both the "Neu" stat and the unseen-word weighting below.
function reconcileProgressWithVocab(){
  let added = 0;
  VOCAB.forEach(v=>{
    if(!(v.id in progress)){
      progress[v.id] = null;
      added++;
    }
  });
  return added;
}

// Counts vocab IDs that exist locally/in VOCAB but aren't represented at
// all in the remote progress.json — used to trigger a structural push
// even when there's no real study-progress difference to send up.
function countMissingFromRemote(remoteData){
  const remoteProgress = (remoteData && typeof remoteData.progress === 'object') ? remoteData.progress : {};
  return VOCAB.filter(v => !(String(v.id) in remoteProgress)).length;
}

async function saveProgress(){
  try{ await window.storage.set('karteikasten-progress', JSON.stringify(progress)); }
  catch(e){ /* not available in this context */ }
  try{ localStorage.setItem('karteikasten-progress', JSON.stringify(progress)); }
  catch(e){ console.error('Speichern fehlgeschlagen', e); }
}

// Returns -1 for "never touched" (null/missing) — deliberately lower than
// any real count, so anything comparing counts (merge logic, weighting)
// naturally treats untouched words as behind real progress, without
// confusing them with a touched word that's been reduced to a real 0.
function countOf(id){
  const v = progress[id];
  return typeof v === 'number' ? v : -1;
}

function statusOf(id){
  if(typeof progress[id] !== 'number') return 'new';
  return progress[id] >= MASTERY_THRESHOLD ? 'known' : 'learning';
}

let toastTimer;
function showToast(msg, isError){
  const t = $('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 3800);
}

function driveSave(){
  const payload = JSON.stringify({ progress, direction, savedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'karteikasten-fortschritt.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Gespeichert — Firefox legt die Datei in deinem Download-Ordner ab.');
}

function driveLoadFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data || typeof data.progress !== 'object') throw new Error('invalid');
      progress = data.progress;
      migrateProgress();
      reconcileProgressWithVocab();
      if(data.direction === 'en-de' || data.direction === 'de-en'){
        direction = data.direction;
        $('directionBtn').textContent = direction === 'de-en' ? 'DE → EN' : 'EN → DE';
      }
      saveProgress();
      saveDirection();
      updateStats();
      buildDeck();
      renderCard();
      if(browsing) renderCatalog();
      showToast('Fortschritt geladen ✓');
    }catch(err){
      showToast('Diese Datei konnte nicht gelesen werden.', true);
    }
  };
  reader.onerror = ()=> showToast('Datei konnte nicht gelesen werden.', true);
  reader.readAsText(file);
}

// ---------- GitHub two-way sync ----------
// Reads are unauthenticated (the repo is public) — no token needed to pull.
// Writes need a token, which is entered once via the 🔑 Token button and
// stored ONLY in this browser's localStorage. It is never written into
// index.html itself, so nobody who simply visits the site can see it —
// only someone with access to dev tools on THIS specific browser could.
// For safety, this should be a fine-grained GitHub PAT scoped to only
// this one repo, with Contents: Read & write — nothing else.
const GH_OWNER = 'DevNinjaX378';
const GH_REPO = 'karteikasten';
const GH_BRANCH = 'main';
const GH_PATH = 'progress.json';

function getGithubToken(){
  try{ return localStorage.getItem('karteikasten-github-token') || ''; }
  catch(e){ return ''; }
}

function setGithubToken(){
  const hasToken = !!getGithubToken();
  const input = prompt(
    hasToken
      ? 'Token ist gesetzt. Neues Token eingeben um zu ersetzen, oder leer lassen + OK um es zu entfernen:'
      : 'GitHub Personal Access Token einfügen (fine-grained, nur für dieses Repo, Contents: Read & write):',
    ''
  );
  if(input === null) return; // cancelled
  const trimmed = input.trim();
  try{
    if(trimmed){
      localStorage.setItem('karteikasten-github-token', trimmed);
      showToast('Token gespeichert (nur in diesem Browser).');
    } else if(hasToken){
      localStorage.removeItem('karteikasten-github-token');
      showToast('Token entfernt.');
    }
  }catch(e){
    showToast('Konnte Token nicht speichern.', true);
  }
}

// UTF-8 safe base64 helpers (German umlauts, ≠, · etc. need this —
// plain atob/btoa alone mangle anything outside Latin-1).
function b64EncodeUtf8(str){ return btoa(unescape(encodeURIComponent(str))); }
function b64DecodeUtf8(str){ return decodeURIComponent(escape(atob(str.replace(/\n/g,'')))); }

// Fetches progress.json straight from the git blob via the Contents API
// (not the GitHub Pages CDN) — this avoids the CDN propagation delay a
// plain fetch('progress.json') would have right after a fresh push.
async function githubGetProgressFile(){
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
  if(res.status === 404) return { data: null, sha: null };
  if(!res.ok) throw new Error('GET ' + res.status);
  const json = await res.json();
  const data = JSON.parse(b64DecodeUtf8(json.content));
  return { data, sha: json.sha };
}

async function githubPutProgressFile(payload, sha, message){
  const token = getGithubToken();
  if(!token) throw new Error('no-token');
  const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
  const body = {
    message,
    content: b64EncodeUtf8(JSON.stringify(payload, null, 2)),
    branch: GH_BRANCH
  };
  if(sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const text = await res.text();
    throw new Error('PUT ' + res.status + ': ' + text);
  }
}

function mergeRemoteProgress(remoteData){
  if(!remoteData || typeof remoteData.progress !== 'object') return 0;
  let updated = 0;
  Object.keys(remoteData.progress).forEach(id=>{
    const rv = remoteData.progress[id];
    const remoteCount = typeof rv === 'number' ? rv : (rv === 'known' ? MASTERY_THRESHOLD : rv === 'learning' ? 0 : null);
    if(remoteCount === null) return;
    if(remoteCount > countOf(id)){
      progress[id] = remoteCount;
      updated++;
    }
  });
  return updated;
}

// Only true if this device has made genuine progress (count > 0) beyond
// whatever's already in the remote file — avoids spuriously trying to
// "push" when nothing meaningful has actually changed.
function localAheadOfRemote(remoteData){
  const remoteProgress = (remoteData && typeof remoteData.progress === 'object') ? remoteData.progress : {};
  return Object.keys(progress).some(id=>{
    const local = countOf(id);
    if(local <= 0) return false;
    const rv = remoteProgress[id];
    const remoteCount = typeof rv === 'number' ? rv : (rv === 'known' ? MASTERY_THRESHOLD : rv === 'learning' ? 0 : 0);
    return local > remoteCount;
  });
}

async function syncWithGithub(manual){
  let remote;
  try{
    remote = await githubGetProgressFile();
  }catch(e){
    if(manual) showToast('Konnte progress.json nicht laden.', true);
    return;
  }

  const pulled = mergeRemoteProgress(remote.data);
  const filled = reconcileProgressWithVocab();
  if(pulled > 0 || filled > 0){
    saveProgress();
    updateStats();
    buildDeck();
    renderCard();
    if(browsing) renderCatalog();
  }

  const missingRemote = countMissingFromRemote(remote.data);
  const needsPush = localAheadOfRemote(remote.data) || missingRemote > 0;

  if(!needsPush){
    if(manual){
      const changed = pulled + filled;
      showToast(changed > 0 ? `${changed} Karte(n) aktualisiert ✓` : 'Bereits aktuell ✓');
    }
    return;
  }

  const token = getGithubToken();
  if(!token){
    if(manual){
      showToast(
        (pulled > 0 || filled > 0)
          ? `${pulled + filled} übernommen — kein Token gesetzt, eigener Fortschritt nicht hochgeladen`
          : 'Eigener Fortschritt ist neuer, aber kein GitHub-Token gesetzt (🔑 Token)',
        true
      );
    }
    return;
  }

  try{
    const payload = { progress, direction, savedAt: new Date().toISOString() };
    const msg = missingRemote > 0
      ? `Karteikasten: Fortschritt synchronisiert (+${missingRemote} neue Einträge ergänzt)`
      : 'Karteikasten: Fortschritt synchronisiert';
    await githubPutProgressFile(payload, remote.sha, msg);
    if(manual){
      showToast((pulled > 0 || filled > 0) ? `${pulled + filled} übernommen, hochgeladen ✓` : 'Fortschritt hochgeladen ✓');
    }
  }catch(e){
    if(manual) showToast('Hochladen fehlgeschlagen — Token prüfen.', true);
  }
}

// Weighted shuffle: cards with a lower mastery counter get a higher chance
// of sorting earlier, so less-practiced words come up more often — but
// it's still randomized, not a strict queue. Never-touched words (-1) get
// a weight clearly above even a freshly-floored touched word (max 1 at
// count=0), so they reliably surface ahead of "struggling" words instead
// of blending in with them.
const NEVER_SEEN_WEIGHT = 3;
function weightOf(card){
  const c = countOf(card.id);
  if(c < 0) return NEVER_SEEN_WEIGHT;
  return 1 / (c + 1);
}

function weightedShuffle(arr){
  return arr
    .map(item => ({ item, key: Math.pow(Math.random(), 1 / weightOf(item)) }))
    .sort((a, b) => b.key - a.key)
    .map(x => x.item);
}

function buildDeck(){
  let pool = VOCAB.slice(); // categories removed — always study the full deck
  if(dueOnly) pool = pool.filter(v => v.review || statusOf(v.id) === 'learning');
  deck = weightedShuffle(pool);
  pos = 0;
  flipped = false;
}

function tabColor(card){
  if(card.gender === 'der') return 'var(--der)';
  if(card.gender === 'die') return 'var(--die)';
  if(card.gender === 'das') return 'var(--das)';
  if(card.category === 'Verb') return 'var(--gold)';
  if(card.category === 'Expression') return 'var(--ink-soft)';
  return 'var(--paper-edge)';
}

function fmtDate(d){
  const [y,m,day] = d.split('-');
  return `${day}.${m}.${y.slice(2)}`;
}

function germanHead(c){
  const article = c.gender || '';
  const term = c.gender ? c.german.replace(/^(der|die|das)\s+/i,'') : c.german;
  return `<div class="term-row"><span class="article ${article}">${article}</span><span class="term">${term}</span></div>
  ${c.plural ? `<div class="plural">Plural: ${c.plural}</div>` : ''}`;
}

function questionContent(c, lang){
  if(lang === 'de'){
    return `${germanHead(c)}<div class="typetag">${c.type_raw}</div>`;
  }
  return `<div class="english">${c.english}</div><div class="typetag">${c.type_raw}</div>`;
}

function answerContent(c, lang){
  const head = lang === 'de' ? germanHead(c) : `<div class="english">${c.english}</div>`;
  return `${head}<div class="example">${c.example}</div>${c.notes ? `<div class="notes">${c.notes}</div>` : ''}`;
}

function faceShell(c, innerHTML, {isDE, showHint}){
  return `
    <div class="holes"><span></span><span></span><span></span></div>
    <div class="tab" style="background:${tabColor(c)}"></div>
    ${isDE && c.review ? '<div class="review-flag">wiederholen</div>' : ''}
    <div class="content-flex">${innerHTML}</div>
    ${showHint ? '<div class="hint">Klicken zum Umdrehen ↻</div>' : ''}
    ${isDE ? `<div class="stamp">eingetr. ${fmtDate(c.date)}</div>` : ''}
  `;
}

function emptyFace(){
  return `<div class="content-flex"><div class="typetag">Keine Karten in dieser Auswahl</div></div>`;
}

function renderCard(){
  $('card3d').classList.remove('flipped');
  flipped = false;
  if(deck.length === 0){
    $('faceFront').innerHTML = emptyFace();
    $('faceBack').innerHTML = '';
    return;
  }
  const c = deck[pos];
  const frontLang = direction === 'de-en' ? 'de' : 'en';
  const backLang = direction === 'de-en' ? 'en' : 'de';
  $('faceFront').innerHTML = faceShell(c, questionContent(c, frontLang), { isDE: frontLang === 'de', showHint: true });
  $('faceBack').innerHTML = faceShell(c, answerContent(c, backLang), { isDE: backLang === 'de', showHint: false });
}

function flip(){
  if(deck.length === 0) return;
  flipped = !flipped;
  $('card3d').classList.toggle('flipped', flipped);
}

// action: 'again' (Nochmal), 'ok' (Passt), 'good' (Sitzt!)
function advance(action){
  if(deck.length === 0) return;
  const c = deck[pos];
  const cur = Math.max(countOf(c.id), 0); // first-ever tap on a never-seen word starts deltas from 0
  let next;
  if(action === 'again'){ next = Math.max(0, cur - 2); sessionAgain++; }
  else if(action === 'ok'){ next = cur + 1; sessionOk++; }
  else { next = cur + 4; sessionGood++; } // 'good' — bigger jump for solidly-known cards

  progress[c.id] = next;
  saveProgress();
  updateStats();

  if(action === 'again'){
    // requeue a few cards later in this session
    const card = deck[pos];
    deck.splice(pos, 1);
    if(pos >= deck.length) pos = 0;
    const insertAt = Math.min(deck.length, pos + 4);
    deck.splice(insertAt, 0, card);
  } else {
    deck.splice(pos, 1);
    if(pos >= deck.length) pos = 0;
  }
  renderCard();
}

function updateStats(){
  let known=0, learning=0, neu=0;
  VOCAB.forEach(v=>{
    const s = statusOf(v.id);
    if(s==='known') known++;
    else if(s==='learning') learning++;
    else neu++;
  });
  $('statKnown').textContent = known;
  $('statLearning').textContent = learning;
  $('statNew').textContent = neu;
}

function renderCatalog(){
  const q = $('searchInput').value.trim().toLowerCase();
  let pool = VOCAB.slice(); // categories removed
  if(q){
    pool = pool.filter(v => v.german.toLowerCase().includes(q) || v.english.toLowerCase().includes(q));
  }
  const list = $('catalogList');
  if(pool.length === 0){
    list.innerHTML = '<div class="empty">Keine Treffer.</div>';
    return;
  }
  list.innerHTML = pool.map(v => `
    <div class="row" data-id="${v.id}">
      <span class="g ${v.gender||''}">${v.gender ? v.gender : ''}</span>
      <span class="de">${v.german}</span>
      <span class="en">${v.english}</span>
      ${v.review ? '<span class="flag">⚑</span>' : ''}
      ${statusOf(v.id)==='known' ? '<span class="known">✓</span>' : ''}
      <span class="cnt">${countOf(v.id) < 0 ? '–' : countOf(v.id)}</span>
    </div>
  `).join('');
  list.querySelectorAll('.row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = parseInt(row.dataset.id);
      const idx = deck.findIndex(d=>d.id===id);
      if(idx === -1){
        const card = VOCAB.find(v=>v.id===id);
        deck.unshift(card);
        pos = 0;
      } else {
        pos = idx;
      }
      setBrowsing(false);
      renderCard();
    });
  });
}

function setBrowsing(on){
  browsing = on;
  $('catalog').classList.toggle('show', on);
  $('stage').classList.toggle('hide', on);
  $('actions').classList.toggle('hide', on);
  if(on) renderCatalog();
}

$('card3d').addEventListener('click', flip);
$('btnAgain').addEventListener('click', ()=>advance('again'));
$('btnOk').addEventListener('click', ()=>advance('ok'));
$('btnGot').addEventListener('click', ()=>advance('good'));
$('shuffleBtn').addEventListener('click', ()=>{ buildDeck(); renderCard(); });
$('browseBtn').addEventListener('click', ()=> setBrowsing(!browsing));
$('driveSaveBtn').addEventListener('click', driveSave);
$('driveLoadBtn').addEventListener('click', ()=> $('importFile').click());
$('syncBtn').addEventListener('click', ()=> syncWithGithub(true));
$('tokenBtn').addEventListener('click', setGithubToken);
$('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) driveLoadFile(file);
  e.target.value = '';
});
$('searchInput').addEventListener('input', renderCatalog);

$('dueOnlyChip').addEventListener('click', ()=>{
  dueOnly = !dueOnly;
  $('dueOnlyChip').classList.toggle('active', dueOnly);
  buildDeck();
  renderCard();
});

$('directionBtn').addEventListener('click', ()=>{
  direction = direction === 'de-en' ? 'en-de' : 'de-en';
  $('directionBtn').textContent = direction === 'de-en' ? 'DE → EN' : 'EN → DE';
  saveDirection();
  renderCard();
});

document.addEventListener('keydown', (e)=>{
  if(browsing) return;
  if(e.code === 'Space'){ e.preventDefault(); flip(); }
  else if(e.key === '1'){ advance('again'); }
  else if(e.key === '2'){ advance('ok'); }
  else if(e.key === '3'){ advance('good'); }
});

async function init(){
  VOCAB = await fetch('vocab.json').then(r => r.json());
  await loadProgress();
  if(reconcileProgressWithVocab() > 0) saveProgress();
  await syncWithGithub(false);
  $('directionBtn').textContent = direction === 'de-en' ? 'DE → EN' : 'EN → DE';
  updateStats();
  buildDeck();
  renderCard();
  $('deckLabel').innerHTML = `<b>${VOCAB.length}</b> Karten`;
}

init();
</script>
</body>
</html>
